name: Release OpenWsdl

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [windows, macos, linux]
        include:
          - target: windows
            os: windows-latest
            artifact_name: openwsdl-windows.msix
          - target: macos
            os: macos-latest
            artifact_name: openwsdl-macos.zip
          - target: linux
            os: ubuntu-latest
            artifact_name: openwsdl-linux.zip

    steps:
      - uses: actions/checkout@v4

      # ── Windows / Linux: usa Flutter stable via action ──────────────────────
      - name: Setup Flutter (stable)
        if: matrix.target != 'macos'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── macOS: instala Flutter master manualmente (fix para macOS 26 Tahoe) ─
      # O subosito/flutter-action serve cache do engine stable mesmo quando
      # channel=master, fazendo o app crashar no macOS 26. A instalação manual
      # garante que o engine correto seja baixado.
      - name: Setup Flutter (master — macOS 26 compatibility)
        if: matrix.target == 'macos'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch master --depth 1 $HOME/flutter-master
          echo "$HOME/flutter-master/bin" >> $GITHUB_PATH
          $HOME/flutter-master/bin/flutter --version
          $HOME/flutter-master/bin/flutter precache --macos

      - name: Install dependencies
        run: flutter pub get

      # ── Windows ──────────────────────────────────────────────────────────────
      - name: Build Windows
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          dart run msix:create
          mkdir dist
          copy build\windows\x64\runner\Release\*.msix dist\

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: Install CocoaPods
        if: matrix.target == 'macos'
        run: sudo gem install cocoapods

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          cd macos && pod install && cd ..
          flutter build macos --release
          mkdir dist
          cd build/macos/Build/Products/Release
          codesign --force --deep --sign - openwsdl.app
          xattr -rc openwsdl.app
          zip -ry ../../../../../dist/openwsdl-macos.zip openwsdl.app

      # Verifica que o engine do build é diferente do stable (4c4c44bd)
      # Se o UUID ainda for 4c4c44bd o fix ainda não chegou ao master
      - name: Verify FlutterMacOS engine UUID
        if: matrix.target == 'macos'
        run: |
          echo "=== FlutterMacOS engine UUID ==="
          dwarfdump --uuid \
            build/macos/Build/Products/Release/openwsdl.app/Contents/Frameworks/FlutterMacOS.framework/Versions/A/FlutterMacOS \
            | grep arm64
          echo "Expected: NOT 4c4c44bd-5555-3144-a133-915cc616219a"

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev
          flutter build linux --release
          mkdir dist
          cd build/linux/x64/release/bundle
          zip -r ../../../../../dist/openwsdl-linux.zip *

      # ── Upload ───────────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: dist/
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*.msix
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
