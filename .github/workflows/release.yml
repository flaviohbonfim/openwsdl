name: Release OpenWsdl

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [windows, macos, linux]
        include:
          - target: windows
            os: windows-latest
            artifact_name: openwsdl-windows.msix
            flutter_channel: stable
          - target: macos
            os: macos-latest
            artifact_name: openwsdl-macos.zip
            flutter_channel: master   # necessário para compatibilidade com macOS 26
          - target: linux
            os: ubuntu-latest
            artifact_name: openwsdl-linux.zip
            flutter_channel: stable

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter_channel }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          dart run msix:create
          mkdir dist
          copy build\windows\x64\runner\Release\*.msix dist\

      - name: Install CocoaPods
        if: matrix.target == 'macos'
        run: sudo gem install cocoapods

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          cd macos && pod install && cd ..
          flutter build macos --release
          mkdir dist
          cd build/macos/Build/Products/Release
          # Ad-hoc signing para distribuição sem Apple Developer account
          codesign --force --deep --sign - openwsdl.app
          # Remove quarentena antes de zipar
          xattr -rc openwsdl.app
          zip -ry ../../../../../dist/openwsdl-macos.zip openwsdl.app

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev
          flutter build linux --release
          mkdir dist
          cd build/linux/x64/release/bundle
          zip -r ../../../../../dist/openwsdl-linux.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*.msix
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}