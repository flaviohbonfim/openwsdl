name: openwsdl
description: Cliente WSDL/SOAP Open Source desktop cross-platform leve, rápido e moderno.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI e Layout
  # multi_split_view: ^3.0.0  # Não necessário - implementamos splitter manual

  # Tema e Persistência
  shared_preferences: ^2.2.2

  # Parser XML
  xml: ^6.5.0

  # HTTP Client
  http: ^1.2.0

  # Ícones
  flutter_svg: ^2.0.9
  url_launcher: ^6.3.1

  # Utilitários
  path_provider: ^2.1.2
  collection: ^1.18.0
  provider: ^6.1.1
  flutter_monaco: ^1.4.0
  uuid: ^4.3.3
  file_picker: ^10.3.10
  flutter_animate: ^4.5.0
  flutter_localizations:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: false
  ios: false
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  linux:
    generate: true
    image_path: "assets/icons/app_icon.png"

msix_config:
  display_name: OpenWsdl
  publisher_display_name: OpenWsdl Open Source
  identity_name: io.openwsdl.app
  publisher: CN=OpenWsdl
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png
  capabilities: internetClient
  install_location: LocalAppData

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

